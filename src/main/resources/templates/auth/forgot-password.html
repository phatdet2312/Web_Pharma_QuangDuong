<!-- src/main/resources/templates/auth/forgot-password.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <title>Quên Mật Khẩu</title>
    <th:block th:replace="~{auth_layout::link-css}"></th:block>
</head>
<body>
    <th:block th:replace="~{auth_layout::header}"></th:block>
    
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <h2 class="text-center">Quên Mật Khẩu</h2>
                <p class="text-center">Nhập email để nhận mã OTP khôi phục mật khẩu.</p>
                
                <div id="alertBox" class="alert d-none"></div>

                <form id="forgotForm">
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <button type="submit" id="btnSubmit" class="btn btn-warning w-100">
                        <span class="btn-text">Gửi mã OTP</span>
                        <span class="spinner-border spinner-border-sm d-none"></span>
                    </button>
                </form>
                <div class="text-center mt-3">
                    <a href="/login">Quay lại đăng nhập</a>
                </div>
            </div>
        </div>
    </div>

    <th:block th:replace="~{auth_layout::footer}"></th:block>

    <script>
        function callApi(url, method, data, btnSelector, onSuccess) {
            const $btn = $(btnSelector);
            const $spinner = $btn.find('.spinner-border');
            const $alert = $('#alertBox');
            const $text = $btn.find('.btn-text');
            const originalText = $text.text();

            $.ajax({
                url: url,
                type: method,
                contentType: 'application/json',
                data: JSON.stringify(data),
                beforeSend: function() {
                    $btn.prop('disabled', true);
                    $spinner.removeClass('d-none');
                    $text.text("Đang xử lý...");
                    $alert.addClass('d-none');
                },
                success: function(response) {
                    onSuccess(response);
                },
                error: function(xhr) {
                    let msg = "Lỗi kết nối";
                    if (xhr.responseJSON !== undefined && xhr.responseJSON !== null) {
                        if (xhr.responseJSON.message !== undefined && xhr.responseJSON.message !== null) {
                            msg = xhr.responseJSON.message;
                        }
                    }
                    $alert.addClass('alert-danger').text(msg).removeClass('d-none');
                },
                complete: function() {
                    $btn.prop('disabled', false);
                    $spinner.addClass('d-none');
                    $text.text(originalText);
                }
            });
        }

        $(document).ready(function() {
            $('#forgotForm').on('submit', function(e) {
                e.preventDefault();
                var email = $('input[name="email"]').val();

                callApi('/api/auth/forgot-password/send-otp', 'POST', { email: email }, '#btnSubmit', function(response) {
                    window.location.href = "/forgot-password/verify-otp";
                });
            });
        });
    </script>
</body>
</html>
