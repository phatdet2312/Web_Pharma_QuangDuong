<!--src/main/resources/templates/auth/login.html-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập</title>
    <th:block th:replace="~{auth_layout::link-css}"></th:block>
    <style>
        .error-message { color: #dc3545; font-size: 0.875em; margin-top: 0.25rem; display: block; }
        .form-control.is-invalid { border-color: #dc3545; background-image: none; }
        .form-control.is-valid { border-color: #198754; }
        .loading-wrapper { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 9999; text-align: center; background: rgba(255, 255, 255, 0.8); padding: 20px; border-radius: 10px; }
        .spinner { border: 8px solid #f3f3f3; border-top: 8px solid #3498db; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <th:block th:replace="~{auth_layout::header}"></th:block>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg border-0 rounded-lg">
                    <div class="card-header bg-primary text-white text-center">
                        <h3 class="font-weight-light my-2">Đăng Nhập</h3>
                    </div>
                    <div class="card-body">
                        <div th:if="${param.locked}" class="alert alert-warning alert-dismissible fade show" role="alert">
                            Tài khoản của bạn đã bị khóa. Vui lòng liên hệ quản trị viên.
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>

                        <div id="alertBox" class="alert d-none alert-dismissible fade show" role="alert">
                            <span id="alertMessage"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>

                        <form id="loginForm">
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="usernameOrEmail" name="username" placeholder="Username hoặc Email" />
                                <label for="usernameOrEmail">Username hoặc Email</label>
                                <div id="usernameOrEmail-error" class="error-message"></div>
                            </div>

                            <div class="form-floating mb-3">
                                <input type="password" class="form-control" id="password" name="password" placeholder="Mật khẩu" />
                                <label for="password">Mật khẩu</label>
                                <div id="password-error" class="error-message"></div>
                            </div>

                            <div class="form-check mb-3">
                                <input type="checkbox" class="form-check-input" id="rememberMe" name="remember-me">
                                <label class="form-check-label" for="rememberMe">Ghi nhớ đăng nhập</label>
                            </div>

                            <div class="d-flex align-items-center justify-content-between mt-4 mb-0">
                                <a class="small" href="/forgot-password">Quên mật khẩu?</a>
                                <button type="submit" id="btnLogin" class="btn btn-primary" disabled>
                                    <span>Đăng nhập</span>
                                    <span class="spinner-border spinner-border-sm d-none"></span>
                                </button>
                            </div>
                        </form>

                        <hr class="my-4">
                        <a href="/oauth2/authorization/google" class="btn btn-danger w-100">
                            <i class="fab fa-google me-2"></i> Đăng nhập bằng Google
                        </a>

                        <p class="text-center mt-3">Chưa có tài khoản? <a href="/register">Đăng ký ngay!</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="loading" class="loading-wrapper d-none">
        <div class="spinner"></div>
    </div>

    <th:block th:replace="~{auth_layout::footer}"></th:block>

    <script>
        $(document).ready(function () {
            const $form = $('#loginForm');
            const $btn = $('#btnLogin');
            const $alert = $('#alertBox');
            const $alertMsg = $('#alertMessage');

            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('logout') || urlParams.has('locked')) {
                localStorage.removeItem('jwtToken');
            }

            function showAlert(type, msg) {
                $alert.removeClass('alert-success alert-danger d-none').addClass(`alert-${type}`);
                $alertMsg.html(msg);
            }

            function validateForm() {
                let usernameOrEmail = $('#usernameOrEmail').val().trim();
                let password = $('#password').val();
                let valid = true;

                if (usernameOrEmail === "") {
                    $('#usernameOrEmail-error').text("Vui lòng nhập username hoặc email");
                    $('#usernameOrEmail').addClass('is-invalid').removeClass('is-valid');
                    valid = false;
                } else {
                    $('#usernameOrEmail-error').text("");
                    $('#usernameOrEmail').removeClass('is-invalid').addClass('is-valid');
                }

                if (password === "") {
                    $('#password-error').text("Vui lòng nhập mật khẩu");
                    $('#password').addClass('is-invalid').removeClass('is-valid');
                    valid = false;
                } else {
                    $('#password-error').text("");
                    $('#password').removeClass('is-invalid').addClass('is-valid');
                }

                if (valid === true) {
                    $btn.prop('disabled', false);
                } else {
                    $btn.prop('disabled', true);
                }
                
                return valid;
            }

            $('#usernameOrEmail, #password').on('input', function() {
                validateForm();
            });

            $form.on('submit', function (e) {
                e.preventDefault();

                if (validateForm() === false) {
                    return;
                }
                
                var rawData = {
                    usernameOrEmail: $('#usernameOrEmail').val().trim(),
                    password: $('#password').val(),
                    rememberMe: $('#rememberMe').is(':checked')
                };
                
                $.ajax({
                    url: '/api/auth/login',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(rawData),
                    beforeSend: function () {
                        $btn.prop('disabled', true);
                        $('#loading').removeClass('d-none');
                        $alert.addClass('d-none');
                    },
                    success: function (response) {
                        let msg = "Đăng nhập thành công! Đang chuyển hướng...";
                        if (response.message !== undefined && response.message !== null) {
                            msg = response.message;
                        }
                        
                        showAlert('success', msg);

                        if (response.data !== undefined && response.data !== null) {
                            if (response.data.clientSecret !== undefined && response.data.clientSecret !== null) {
                                sessionStorage.setItem('clientSecret', response.data.clientSecret);
                            }
                            
                            setTimeout(function() {
                                let targetUrl = "/";
                                if (response.data.redirectUrl !== undefined && response.data.redirectUrl !== null) {
                                    targetUrl = response.data.redirectUrl;
                                }
                                window.location.href = targetUrl;
                            }, 1000);
                        } else {
                            setTimeout(function() {
                                window.location.href = "/";
                            }, 1000);
                        }
                    },
                    error: function (xhr) {
                        let msg = "Đăng nhập thất bại";
                        if (xhr.responseJSON !== undefined && xhr.responseJSON !== null) {
                            if (xhr.responseJSON.message !== undefined && xhr.responseJSON.message !== null) {
                                msg = xhr.responseJSON.message;
                            }
                        }
                        showAlert('danger', msg);

                        $('#password').val('').addClass('is-invalid');
                        $('#loading').addClass('d-none');
                        $btn.prop('disabled', false);
                    }
                });
            });
        });
    </script>
</body>
</html>
