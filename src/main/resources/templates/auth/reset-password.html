<!--- src/main/resources/templates/auth/reset-password.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <title>Đổi Mật Khẩu</title>
    <th:block th:replace="~{auth_layout::link-css}"></th:block>
</head>
<body>
    <th:block th:replace="~{auth_layout::header}"></th:block>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <h2 class="text-center">Đặt Lại Mật Khẩu</h2>
                
                <div id="alertBox" class="alert d-none"></div>

                <form id="resetForm">
                    <div class="mb-3">
                        <label>Mật khẩu mới</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Xác nhận mật khẩu</label>
                        <input type="password" name="confirmPassword" class="form-control" required>
                    </div>
                    <button type="submit" id="btnSubmit" class="btn btn-primary w-100">
                        <span class="btn-text">Cập nhật mật khẩu</span>
                        <span class="spinner-border spinner-border-sm d-none"></span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <th:block th:replace="~{auth_layout::footer}"></th:block>

    <script>
        function callApi(url, method, data, btnSelector, onSuccess) {
            const $btn = $(btnSelector);
            const $spinner = $btn.find('.spinner-border');
            const $alert = $('#alertBox');
            const $text = $btn.find('.btn-text');
            const originalText = $text.text();

            $.ajax({
                url: url,
                type: method,
                contentType: 'application/json',
                data: JSON.stringify(data),
                beforeSend: function() {
                    $btn.prop('disabled', true);
                    $spinner.removeClass('d-none');
                    $text.text("Đang xử lý...");
                    $alert.addClass('d-none').removeClass('alert-danger');
                },
                success: function(response) {
                    onSuccess(response);
                },
                error: function(xhr) {
                    let msg = "Lỗi kết nối";
                    if (xhr.responseJSON !== undefined && xhr.responseJSON !== null) {
                        if (xhr.responseJSON.message !== undefined && xhr.responseJSON.message !== null) {
                            msg = xhr.responseJSON.message;
                        }
                    }
                    $alert.addClass('alert-danger').text(msg).removeClass('d-none');
                },
                complete: function() {
                    $btn.prop('disabled', false);
                    $spinner.addClass('d-none');
                    $text.text(originalText);
                }
            });
        }

        $(document).ready(function() {
            $('#resetForm').on('submit', function(e) {
                e.preventDefault();
                
                var password = $('input[name="password"]').val();
                var confirmPassword = $('input[name="confirmPassword"]').val();

                if (password !== confirmPassword) {
                    $('#alertBox').addClass('alert-danger').text("Mật khẩu xác nhận không khớp").removeClass('d-none');
                    return;
                }

                callApi('/api/auth/reset-password', 'POST', { 
                    password: password, 
                    confirmPassword: confirmPassword 
                }, '#btnSubmit', function(response) {
                    alert("Đổi mật khẩu thành công! Vui lòng đăng nhập lại.");
                    window.location.href = "/login";
                });
            });
        });
    </script>
</body>
</html>
