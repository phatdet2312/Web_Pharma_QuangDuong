# ================================================================
#  APPLICATION.PROPERTIES — CẤU HÌNH BẮT BUỘC
#  Kết hợp với: TomcatServerConfig.java + PublicApiSizeFilter.java
#
#  NGUYÊN TẮC: Mọi giới hạn GLOBAL đặt ở đây (cấu hình tĩnh, load 1 lần).
#              Mọi giới hạn PER-REQUEST xử lý trong Valve/Filter (runtime).
#              KHÔNG đặt giới hạn global bên trong Valve/Filter vì sẽ gây
#              race condition khi nhiều thread cùng thay đổi shared state.
# ================================================================
 
 
# ── GIỚI HẠN BODY CẤP TOMCAT CONNECTOR ──────────────────────────────────────
#
# max-http-form-post-size: Giới hạn body khi Content-Type = application/x-www-form-urlencoded
# Tomcat đọc và parse form data này ở native code (tối ưu hơn Java filter).
# 10KB khớp với GIOI_HAN_BYTES trong Valve và Filter.
# → Lưới an toàn cuối cùng nếu Valve bị bypass (không thể xảy ra, nhưng defense in depth)
server.tomcat.max-http-form-post-size=10KB
 
# max-swallow-size=0: Khi Valve/Filter reject request (trả 4xx/5xx),
# Tomcat MẶC ĐỊNH sẽ cố đọc hết body còn lại của client để duy trì Keep-Alive.
# Với giá trị 0 → Tomcat đóng socket TCP NGAY, không đọc thêm 1 byte nào.
# Hiệu quả: Hacker gửi chunked body vô hạn → bị cắt kết nối ngay khi bị từ chối.
# Nhược điểm: Mất HTTP Keep-Alive cho request bị reject → client phải TCP reconnect.
# Với request bị từ chối (DoS/flood), đây là hành vi MONG MUỐN.
server.tomcat.max-swallow-size=0
 
 
# ── THREAD POOL ──────────────────────────────────────────────────────────────
#
# max: Số thread xử lý request đồng thời tối đa.
# 1 thread ≈ 1MB stack (JVM default) → 200 threads ≈ 200MB RAM cho thread pool.
# Tăng số này nếu server có nhiều RAM và workload CPU-bound.
# Giảm nếu workload I/O-bound (dùng NIO async thay thế).
server.tomcat.threads.max=200
 
# min-spare: Số thread luôn sẵn sàng (warm), tránh latency spike khi traffic tăng đột biến.
# 20 threads idle ≈ 20MB RAM → chi phí thấp, lợi ích cao.
server.tomcat.threads.min-spare=20
 
 
# ── GIỚI HẠN HEADER ──────────────────────────────────────────────────────────
#
# Chặn Large Header Attack: Hacker gửi header khổng lồ (Cookie injection,
# JWT inflation, custom header flood) để làm nghẽn header parser.
# 8KB đủ cho mọi header hợp lệ thực tế (JWT token thường < 4KB).
server.max-http-request-header-size=8KB
 
 
# ── LOGGING ──────────────────────────────────────────────────────────────────
#
# Chỉ log INFO và WARNING từ config package của chúng ta.
# KHÔNG dùng System.err.println trong code — dùng java.util.logging.Logger
# với async handler để tránh blocking I/O trên request thread.
logging.level.PharmaceuticalsWeb.Phatdev_Pharmaceuticals.config=INFO
 

 # ==================== KÍCH THƯỚC MULTIPART (UPLOAD FILE) ====================
# Phải cấu hình đồng bộ với GIOI_HAN_NOI_BO (50MB) trong PublicApiSizeFilter
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB


 # ==================== IP của reverse proxy nội bộ (Nginx, Load Balancer) ====================

# Dải IP của reverse proxy nội bộ (Nginx, Load Balancer).
# Chỉ request từ dải này mới được tin X-Forwarded-For.
# Ví dụ: AWS ELB nội bộ thường là 10.x.x.x
# Cloudflare cần thêm: 103. hoặc 172.
app.security.trusted-proxy-prefix=10.
 

 # ==================== REVERSE PROXY & HTTPS CONFIG ====================
# Bật chiến lược tự động nhận diện giao thức HTTPS từ Nginx/Cloudflare
server.forward-headers-strategy=framework

# Kích hoạt tính năng ép Tomcat tin tưởng Proxy để nối đúng https:// khi Redirect
server.tomcat.remoteip.protocol-header=x-forwarded-proto
server.tomcat.remoteip.protocol-header-https-value=https

