# ================================================================
#  TÓM TẮT LUỒNG BẢO VỆ KHI CÓ TẤN CÔNG
# ================================================================
#
#  [Hacker gửi request với Content-Length = 100MB]
#    → NIO Connector: ConnectionTimeout=5s (chống Slowloris)
#    → Engine Valve: Đọc Content-Length header (O(1)) → 100MB > 10KB → 413 ngay
#    → max-swallow-size=0: Tomcat đóng socket, không đọc 100MB body
#    → Tổng chi phí server: ~1μs, ~0 byte body đọc vào
#
#  [Hacker gửi chunked body vô hạn, không khai báo Content-Length]
#    → Engine Valve: Content-Length = -1 → không chặn ở Valve
#    → PublicApiSizeFilter: Bọc InputStream, đếm byte thực
#    → Sau 10KB+1 byte: ném PayloadTooLargeException → 413
#    → max-swallow-size=0: Tomcat đóng socket ngay
#
#  [Hacker dùng botnet flood 10,000 req/s từ 1 IP]
#    → Engine Valve Rate Limiter: >20 req/s → 429
#    → Sau 5 vi phạm: Ban IP 60s → mọi request tiếp theo 429 ngay (O(1))
#
#  [Hacker dùng Slowloris: gửi header cực chậm]
#    → NIO Connector ConnectionTimeout=5s: Đóng socket sau 5s không có full header
#    → Thread được release, không bị giữ mãi
#
#  [Request hợp lệ từ user thật]
#    → Engine Valve: Pass qua sau ~2-5μs kiểm tra
#    → PublicApiSizeFilter: Skip hoàn toàn (Content-Length đã rõ, ≤ 10KB)
#    → Spring Controller: Xử lý bình thường
#    → Zero overhead đáng kể so với không có bảo vệ
# ================================================================